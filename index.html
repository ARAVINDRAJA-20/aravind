<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login Page</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:linear-gradient(135deg,#4facfe,#00f2fe);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.login-container{
    background:#fff;
    width:360px;
    padding:35px;
    border-radius:12px;
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
    text-align:center;
}

.logo{
    width:90px;
    height:90px;
    border-radius:50%;
    margin-bottom:15px;
}

h2{
    margin-bottom:25px;
    color:#333;
}

.input-box{
    width:100%;
    margin-bottom:18px;
}

.input-box input{
    width:100%;
    padding:12px;
    border:1px solid #ccc;
    border-radius:8px;
    font-size:16px;
}

.options{
    display:flex;
    justify-content:space-between;
    align-items:center;
    font-size:14px;
    margin-bottom:20px;
}

.options a{
    text-decoration:none;
    color:#007bff;
}

.options a:hover{
    text-decoration:underline;
}

button{
    width:100%;
    padding:12px;
    background:#007bff;
    color:#fff;
    border:none;
    border-radius:8px;
    font-size:18px;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#0056b3;
}

.footer{
    margin-top:20px;
    font-size:14px;
}

.footer a{
    text-decoration:none;
    color:#007bff;
}
</style>

</head>
<body>

<div class="login-container">

    <!-- Replace logo.png with your own logo -->
    <img src="APEC IMAGE.jpeg" alt="APEC IMAGE.jpeg" class="logo">

    <h2>Login</h2>

    <form action="#" method="POST">

        <div class="input-box">
            <input type="text" name="username" placeholder="Username" required>
        </div>

        <div class="input-box">
            <input type="password" name="password" placeholder="Password" required>
        </div>

        <div class="options">
            <label>
                <input type="checkbox"> Remember Me
            </label>
            <a href="#">Forgot Password?</a>
        </div>

        <button type="submit">Login</button>

    </form>

    <div class="footer">
        Don't have an account?
        <a href="#">Sign Up</a>
    </div>

</div>

</body>
</html>
