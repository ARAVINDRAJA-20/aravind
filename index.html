<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>College Login Portal</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:#f6f6f6;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    width:420px;
    background:#fff;
    padding:35px;
    border-radius:20px;
    border-top:5px solid #b91c1c;
    box-shadow:0 8px 20px rgba(0,0,0,0.15);
}

.logo{
    display:flex;
    justify-content:center;
}

.logo img{
    width:110px;
}

h1{
    text-align:center;
    color:#b91c1c;
    margin-top:15px;
    font-size:34px;
}

h2{
    text-align:center;
    color:#444;
    margin-bottom:35px;
    font-size:22px;
}

label{
    display:block;
    margin-bottom:8px;
    font-size:18px;
    font-weight:bold;
    color:#333;
}

input{
    width:100%;
    padding:15px;
    font-size:18px;
    border:2px solid #ddd;
    border-radius:10px;
    outline:none;
}

.input-box{
    position:relative;
    margin-bottom:25px;
}

.show{
    position:absolute;
    right:15px;
    top:16px;
    cursor:pointer;
    color:#555;
    font-size:16px;
}

.forgot{
    text-align:right;
    margin-top:-8px;
    margin-bottom:25px;
}

.forgot a{
    color:#b91c1c;
    text-decoration:none;
    font-size:18px;
}

button{
    width:100%;
    padding:16px;
    border:none;
    background:#b91c1c;
    color:white;
    font-size:24px;
    border-radius:10px;
    cursor:pointer;
    font-weight:bold;
}

button:hover{
    background:#9f1515;
}

.footer{
    text-align:center;
    margin-top:35px;
    color:#b91c1c;
    font-size:22px;
    font-weight:bold;
    letter-spacing:2px;
}

@media(max-width:500px){
    .container{
        width:95%;
        padding:25px;
    }

    h1{
        font-size:28px;
    }

    .footer{
        font-size:18px;
    }
}
</style>

</head>
<body>

<div class="container">

    <div class="logo">
        <img src="APEC IMAGE.jpeg" alt="College Logo">
    </div>

    <h1>Adhiparasakthi Engineering College</h1>
    <h2>Melmaruvathur</h2>

    <form>

        <label>Username / Register Number</label>

        <div class="input-box">
            <input type="text" placeholder="Enter your username" required>
        </div>

        <label>Password</label>

        <div class="input-box">
            <input type="password" id="password" placeholder="Enter your password" required>

            <span class="show" onclick="togglePassword()">Show</span>
        </div>

        <div class="forgot">
            <a href="#">Forgot Password?</a>
        </div>

        <button type="submit">Login to Portal</button>

    </form>

    <div class="footer">
        STUDY • SPIRITUALITY • SERVICE
    </div>

</div>

<script>
function togglePassword() {
    var password = document.getElementById("password");
    var text = document.querySelector(".show");

    if (password.type === "password") {
        password.type = "text";
        text.innerHTML = "Hide";
    } else {
        password.type = "password";
        text.innerHTML = "Show";
    }
}
</script>

</body>
</html>
